<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สวัสดีวันสงกรานต์</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="page" id="page">

        <!-- Ambient particles -->
        <div class="drops-container" id="drops"></div>

        <!-- Corner decorations -->
        <div class="corner-lotus tl">🌸</div>
        <div class="corner-lotus tr">🌺</div>
        <div class="corner-lotus bl">🌼</div>
        <div class="corner-lotus br">🌸</div>

        <!-- Animated waves -->
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>

        <!-- Main content -->
        <div class="content">
        <div class="year-badge">🎉 ปี ๒๕๖๙ · SONGKRAN 2026</div>

        <h1 class="title">
            สวัสดี<br>
            <span class="title-accent">วันสงกรานต์</span>
        </h1>

        <p class="subtitle">
            ขอให้ชีวิตชุ่มฉ่ำ สดใส<br>
            ดั่งสายน้ำที่ไหลพัดพาสิ่งไม่ดีออกไป<br>
            สุขสันต์วันปีใหม่ไทย 🙏
        </p>

        <div class="emoji-row">
            <span>💧</span>
            <span>🌊</span>
            <span>🎊</span>
            <span>🌺</span>
            <span>🙏</span>
        </div>

        <button class="btn" id="splash-btn">💦 สาดน้ำ!</button>
        </div>

        <!-- Counter -->
        <div class="splash-count" id="counter">แตะหน้าจอเพื่อสาดน้ำ 💦</div>

    </div>

    <script src="script.js"></script>
</body>
</html>
